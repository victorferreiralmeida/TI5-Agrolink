# Cria usuários demo na primeira subida se a tabela estiver vazia (veja code/README.md).
agrolink.demo-seed=true

# Porta HTTP: padrão 8080. Se der "Port 8080 was already in use", encerre o java antigo
# (veja netstat -ano | findstr :8080) ou use outra porta: SERVER_PORT=8081 e AGROLINK_API_URL=http://localhost:8081 no npm run dev.
server.port=8080

# H2 em arquivo (pasta data/ na raiz do módulo back — já está no .gitignore)
spring.datasource.url=jdbc:h2:file:./data/agrolink;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Permite acessar o console de outros hosts (útil em rede local / tunelamento)
spring.h2.console.settings.web-allow-others=true

# Evita respostas estranhas em alguns clientes HTTP com HTTP/2
server.http2.enabled=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

agrolink.rabbitmq.chat.exchange=agrolink.chat.exchange
agrolink.rabbitmq.chat.queue=agrolink.chat.messages
agrolink.rabbitmq.chat.routing-key=chat.mensagem.criada