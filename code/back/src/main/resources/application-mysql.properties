# Não popular equipe demo em MySQL a menos que você defina explicitamente true.
agrolink.demo-seed=false

# Padrão do npm run dev (start-backend.mjs). H2: SPRING_PROFILES_ACTIVE=dev
#
# Variáveis de ambiente (defina MYSQL_PASSWORD com a senha do root ou do usuário):
#
# Variáveis de ambiente sugeridas:
#   MYSQL_HOST (padrão localhost)
#   MYSQL_PORT (padrão 3306)
#   MYSQL_DATABASE (padrão agrolink)
#   MYSQL_USER
#   MYSQL_PASSWORD

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:agrolink}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.h2.console.enabled=false
